  .sync-indicator.connected .dot{background:#51cf66;box-shadow:0 0 6px rgba(81,207,102,0.5)}
  .sync-indicator.syncing .dot{background:#e6a019;animation:pulse 1s infinite}
  .sync-indicator.offline .dot{background:#ff6b6b}
  .sync-indicator.error .dot{background:#ff6b6b}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .sync-time{font-size:10px;color:#6a6a7a}
  .sync-btn{padding:3px 10px;border-radius:12px;border:1px solid rgba(230,160,25,0.3);background:rgba(230,160,25,0.08);color:#e6a019;cursor:pointer;font-size:11px;font-family:'Noto Sans KR';transition:all 0.2s}

  .config-panel input[type=text]:focus{border-color:#e6a019}
  .config-panel .config-actions{display:flex;gap:8px;margin-top:10px}
  .config-panel .config-actions button{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:'Noto Sans KR';font-weight:600}
  .config-panel .btn-save{background:#e6a019;color:#0d0d1a}
  .config-panel .btn-upload{background:rgba(81,207,102,0.15);color:#51cf66;border:1px solid rgba(81,207,102,0.3) !important}
  .config-panel .config-hint{font-size:10px;color:#6a6a7a;margin-top:6px}

  .toolbar{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}

  .overall{background:rgba(230,160,25,0.06);border:1px solid rgba(230,160,25,0.2);border-radius:14px;padding:20px;margin-bottom:20px}

  .overall-label{font-size:14px;font-weight:600;color:#e6a019}
  .overall-pct{font-size:26px;font-weight:900;color:#f5d77a}

  .overall-info{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#8a8a9a}

  .stage-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all 0.2s}

  try{
    const s=localStorage.getItem(KEY);
    if(s){const p=JSON.parse(s);data=p.data||{};tips=p.tips||{};loaded=true}
  }catch(e){}
  if(!loaded){data=JSON.parse(JSON.stringify(DEFAULT_DATA));tips=JSON.parse(JSON.stringify(DEFAULT_TIPS))}

  // 누락 키 보충
  STAGES.forEach(s=>s.materials.forEach(([mat])=>{
    const k=s.id+"|"+mat;
    if(!data[k])data[k]=MEMBERS.reduce((a,m)=>({...a,[m]:0}),{});
    if(!tips[k])tips[k]="";
  }));

  renderAll();

  // 클라우드에서 데이터 불러오기
  if(apiUrl){
    fetchFromCloud();
    startAutoSync();
  } else {
    setSyncStatus("offline","설정 필요");
  }
}

// ════════════════════════════════════════════
//  동기화 상태 표시
// ════════════════════════════════════════════
function setSyncStatus(status, label){
  const el=document.getElementById("syncStatus");
  const lb=document.getElementById("syncLabel");
  el.className="sync-indicator "+status;
  lb.textContent=label;
}

function updateSyncTime(){
  document.getElementById("syncTime").textContent="마지막: "+new Date().toLocaleTimeString("ko-KR");
}

// ════════════════════════════════════════════
//  클라우드 통신 (Google Apps Script)
// ════════════════════════════════════════════

// GET: 전체 데이터 불러오기
async function fetchFromCloud(){
  if(!apiUrl || isSyncing) return;
  isSyncing=true;
  setSyncStatus("syncing","동기화 중...");
  try{
    const res=await fetch(apiUrl+"?t="+Date.now());
    const json=await res.json();
    if(json.success && json.data && Object.keys(json.data).length>0){
      // 서버 데이터로 병합 (서버 우선)
      Object.keys(json.data).forEach(k=>{
        data[k]=json.data[k];
      });
      if(json.tips){
        Object.keys(json.tips).forEach(k=>{
          if(json.tips[k]) tips[k]=json.tips[k];
        });
      }
      saveLocal();
      // 입력 중이면 포커스를 유지하며 스마트 업데이트
      const focused=document.activeElement;
      if(focused && (focused.classList.contains("num")||focused.classList.contains("tip"))){
        smartSyncUpdate();
      } else {
        renderAll();
      }
      setSyncStatus("connected","연결됨");
      updateSyncTime();
    } else if(json.success){
      setSyncStatus("connected","연결됨 (서버 비어있음)");
      updateSyncTime();
    } else {
      setSyncStatus("error","오류: "+json.error);
    }
  }catch(e){
    console.error("Fetch error:",e);
    setSyncStatus("error","연결 실패");
  }
  isSyncing=false;
}

// ── 포커스 유지하며 서버 데이터로 입력칸 + 통계 업데이트 ──
function smartSyncUpdate(){
  const focused=document.activeElement;
  // 현재 포커스된 input이 아닌 다른 input값들만 서버 데이터로 갱신
  document.querySelectorAll("input.num").forEach(inp=>{
    if(inp===focused) return; // 현재 입력 중인 칸은 건드리지 않음
    const k=inp.getAttribute("onchange")?.match(/'([^']+)'/g);
    if(k && k.length>=2){
      const key=k[0].replace(/'/g,"");
      const member=k[1].replace(/'/g,"");
      const serverVal=data[key]?.[member]||0;
      if(parseInt(inp.value)||0 !== serverVal){
        inp.value=serverVal||"";
      }
    }
  });
  // 꿀팁도 업데이트 (포커스된 것 제외)
  document.querySelectorAll("input.tip").forEach(inp=>{
    if(inp===focused) return;
    const k=inp.getAttribute("onchange")?.match(/'([^']+)'/);
    if(k){
      const key=k[1];
      const serverTip=tips[key]||"";
      if(inp.value!==serverTip) inp.value=serverTip;
    }
  });
  updateStatsOnly();
}

// POST: 단일 셀 업데이트
async function pushCellToCloud(key, member, value){
  if(!apiUrl) return;
  try{
    await fetch(apiUrl,{
      method:"POST",
      headers:{"Content-Type":"text/plain"}, // Apps Script CORS 우회
      body:JSON.stringify({action:"update_cell",key,member,value}),
      mode:"no-cors"
    });
    // no-cors이므로 응답을 읽을 수 없지만, 전송은 됨
  }catch(e){
    console.error("Push cell error:",e);
  }
}

// POST: 꿀팁 업데이트
async function pushTipToCloud(key, value){
  if(!apiUrl) return;
  try{
    await fetch(apiUrl,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"update_tip",key,value}),
      mode:"no-cors"
    });
  }catch(e){
    console.error("Push tip error:",e);
  }
}

// POST: 전체 데이터 업로드
async function uploadToCloud(){
  if(!apiUrl){showToast("먼저 API URL을 설정하세요!");return}
  setSyncStatus("syncing","업로드 중...");
  try{
    const res=await fetch(apiUrl,{
      method:"POST",
      body:JSON.stringify({action:"bulk_sync",data,tips}),
    });
    const json=await res.json();
    if(json.success){
      showToast("☁️ 스프레드시트에 전체 데이터 업로드 완료!");
      setSyncStatus("connected","연결됨");
      updateSyncTime();
    } else {
      showToast("업로드 실패: "+json.error);
      setSyncStatus("error","업로드 실패");
    }
  }catch(e){
    console.error("Upload error:",e);
    showToast("업로드 실패! URL을 확인해주세요.");
    setSyncStatus("error","업로드 실패");
  }
}

// 자동 동기화 타이머
function startAutoSync(){
  if(syncTimer) clearInterval(syncTimer);
  syncTimer=setInterval(()=>{
    if(apiUrl) fetchFromCloud();
  },SYNC_INTERVAL);
}

function manualSync(){
  if(apiUrl){
    fetchFromCloud();
  } else {
    showToast("먼저 API URL을 설정하세요!");
  }
}

// ════════════════════════════════════════════
//  설정 패널
// ════════════════════════════════════════════
function toggleConfig(){
  document.getElementById("configPanel").classList.toggle("show");
}

function saveApiUrl(){
  const url=document.getElementById("apiUrlInput").value.trim();
  if(!url){showToast("URL을 입력하세요!");return}
  apiUrl=url;
  localStorage.setItem(API_KEY,url);
  showToast("✅ API URL 저장 완료!");
  fetchFromCloud();
  startAutoSync();
  document.getElementById("configPanel").classList.remove("show");
}

// ════════════════════════════════════════════
//  데이터 관리
// ════════════════════════════════════════════
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify({data,tips}))}catch(e){}}
function save(){saveLocal()}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",2500)}

function toggleStage(id){activeStage=activeStage===id?null:id;renderAll()}

// 디바운스 유틸
const _debounceTimers={};
function debounce(id,fn,ms=500){
  clearTimeout(_debounceTimers[id]);
  _debounceTimers[id]=setTimeout(fn,ms);
}

function updateVal(key,member,val){
  data[key][member]=Math.max(0,parseInt(val)||0);
  save();
  updateStatsOnly(); // 입력 중엔 통계만 업데이트 (테이블 재렌더 안함)
  // 클라우드에 디바운스 전송
  debounce("cell_"+key+"_"+member, ()=>{
    pushCellToCloud(key,member,data[key][member]);
  }, 800);
}

function updateTip(key,val){
  tips[key]=val;
  save();
  debounce("tip_"+key, ()=>{
    pushTipToCloud(key,val);
  }, 1000);
}

// ════════════════════════════════════════════
//  통계 & 렌더링
// ════════════════════════════════════════════
function getStats(){
  let tN=0,tD=0;
  STAGES.forEach(s=>s.materials.forEach(([mat,need])=>{
    const k=s.id+"|"+mat;tN+=need;
    let matSum=0;MEMBERS.forEach(m=>{matSum+=data[k]?.[m]||0});
    tD+=Math.min(matSum,need);
  }));
  const sp=STAGES.map(s=>{
    let sN=0,sD=0;
    s.materials.forEach(([mat,need])=>{
      sN+=need;let matSum=0;MEMBERS.forEach(m=>{matSum+=data[s.id+"|"+mat]?.[m]||0});
      sD+=Math.min(matSum,need);
    });
    return{id:s.id,needed:sN,done:sD,pct:sN?(sD/sN*100):0};
  });
  return{tN,tD,pct:tN?(tD/tN*100):0,sp};
}

function renderAll(){
  const st=getStats();
  document.getElementById("overallPct").textContent=st.pct.toFixed(1)+"%";
  document.getElementById("overallBar").style.width=st.pct+"%";
  document.getElementById("overallDone").textContent="기입: "+st.tD.toLocaleString();
  document.getElementById("overallNeed").textContent="필요: "+st.tN.toLocaleString();

  let sg="";
  st.sp.forEach(s=>{
    const act=activeStage===s.id?"active":"";
    const col=s.pct>=100?"#51cf66":"#e6a019";
    const bg=s.pct>=100?"#51cf66":"linear-gradient(90deg,#e6a019,#f5d77a)";
    sg+=`<div class="stage-card ${act}" onclick="toggleStage('${s.id}')"><div class="stage-card-top"><span class="stage-card-name">${s.id}</span><span class="stage-card-pct" style="color:${col}">${s.pct.toFixed(0)}%</span></div><div class="stage-bar"><div class="stage-bar-fill" style="width:${s.pct}%;background:${bg}"></div></div></div>`;
  });
  document.getElementById("stageGrid").innerHTML=sg;

  let tb="";
  STAGES.filter(s=>!activeStage||s.id===activeStage).forEach(s=>{
    const sp=st.sp.find(x=>x.id===s.id);
    const sid=s.id.replace("-","_");
    tb+=`<div class="stage-block"><div class="stage-header"><span class="stage-header-name">단계 ${s.id}</span><span class="stage-header-pct" id="sh_${sid}">${sp.pct.toFixed(1)}% 완료</span></div><div class="table-wrap"><table><thead><tr><th>재료</th><th style="width:58px">필요</th>`;
    MEMBERS.forEach((m,i)=>tb+=`<th style="color:${COLORS[i]};min-width:68px">${m}</th>`);
    tb+=`<th style="width:58px">합계</th><th style="width:58px">잔여</th><th style="width:64px">달성</th><th style="min-width:200px">꿀팁공유</th></tr></thead><tbody>`;
    s.materials.forEach(([mat,need],mi)=>{
      const k=s.id+"|"+mat,row=data[k]||{};
      const sum=MEMBERS.reduce((a,m)=>a+(row[m]||0),0);
      const rem=need-sum;
      const done=rem<=0;
      const rid=sid+"_"+mi;
      tb+=`<tr><td>${mat}</td><td class="ctr" style="font-weight:600">${need.toLocaleString()}</td>`;
      MEMBERS.forEach(m=>{
        const v=row[m]||"";
        tb+=`<td class="ctr" style="padding:3px"><input class="num" type="number" min="0" value="${v||""}" placeholder="0" onchange="updateVal('${k}','${m}',this.value)" oninput="updateVal('${k}','${m}',this.value)"></td>`;
      });
      tb+=`<td class="ctr" style="font-weight:700;color:#f5d77a" id="sum_${rid}">${sum.toLocaleString()}</td>`;
      tb+=`<td class="ctr" style="font-weight:700" id="rem_${rid}">${rem.toLocaleString()}</td>`;
      tb+=`<td class="ctr" id="badge_${rid}">${done?'<span class="badge-done">목표달성</span>':''}</td>`;
      const tipVal=(tips[k]||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      tb+=`<td style="padding:3px"><input class="tip" type="text" value="${tipVal}" placeholder="꿀팁을 입력하세요" onchange="updateTip('${k}',this.value)"></td>`;
      tb+=`</tr>`;
    });
    tb+=`</tbody></table></div></div>`;
  });
  document.getElementById("tableView").innerHTML=tb;
}

// ── 입력 중 포커스 유지하며 통계만 업데이트 ──
function updateStatsOnly(){
  const st=getStats();
  document.getElementById("overallPct").textContent=st.pct.toFixed(1)+"%";
  document.getElementById("overallBar").style.width=st.pct+"%";
  document.getElementById("overallDone").textContent="기입: "+st.tD.toLocaleString();
  document.getElementById("overallNeed").textContent="필요: "+st.tN.toLocaleString();

  // 스테이지 카드 업데이트
  const cards=document.querySelectorAll(".stage-card");
  st.sp.forEach((s,i)=>{
    if(cards[i]){
      const pctEl=cards[i].querySelector(".stage-card-pct");
      const barEl=cards[i].querySelector(".stage-bar-fill");
      if(pctEl){pctEl.textContent=s.pct.toFixed(0)+"%";pctEl.style.color=s.pct>=100?"#51cf66":"#e6a019"}
      if(barEl){barEl.style.width=s.pct+"%";barEl.style.background=s.pct>=100?"#51cf66":"linear-gradient(90deg,#e6a019,#f5d77a)"}
    }
  });

  // 테이블 내 합계/잔여/달성 + 스테이지 헤더만 업데이트
  STAGES.filter(s=>!activeStage||s.id===activeStage).forEach(s=>{
    const sp=st.sp.find(x=>x.id===s.id);
    const sid=s.id.replace("-","_");
    const shEl=document.getElementById("sh_"+sid);
    if(shEl) shEl.textContent=sp.pct.toFixed(1)+"% 완료";

    s.materials.forEach(([mat,need],mi)=>{
      const k=s.id+"|"+mat,row=data[k]||{};
      const sum=MEMBERS.reduce((a,m)=>a+(row[m]||0),0);
      const rem=need-sum;
      const done=rem<=0;
      const rid=sid+"_"+mi;

      const sumEl=document.getElementById("sum_"+rid);
      const remEl=document.getElementById("rem_"+rid);
      const badgeEl=document.getElementById("badge_"+rid);

      if(sumEl) sumEl.textContent=sum.toLocaleString();
      if(remEl){remEl.textContent=rem.toLocaleString();remEl.style.color=done?"#51cf66":"#ff6b6b"}
      if(badgeEl) badgeEl.innerHTML=done?'<span class="badge-done">목표달성</span>':'';
    });
  });
}

// ════════════════════════════════════════════
//  내보내기 / 불러오기 / 초기화
// ════════════════════════════════════════════
function exportJSON(){
  const b=new Blob([JSON.stringify({data,tips},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download="함선제작_"+new Date().toISOString().slice(0,10)+".json";a.click();
  showToast("데이터를 내보냈습니다!");
}

function importJSON(){
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{
      const p=JSON.parse(ev.target.result);
      data=p.data||p;tips=p.tips||{};
      save();renderAll();
      showToast("데이터를 불러왔습니다!");
      // 클라우드에도 동기화
      if(apiUrl && confirm("불러온 데이터를 스프레드시트에도 업로드하시겠습니까?")) uploadToCloud();
    }catch(e){showToast("파일 형식 오류!")}};r.readAsText(f)};
  input.click();
}

function resetAll(){
  if(!confirm("모든 데이터를 초기화하시겠습니까?"))return;
  data=JSON.parse(JSON.stringify(DEFAULT_DATA));
  tips=JSON.parse(JSON.stringify(DEFAULT_TIPS));
  save();renderAll();showToast("초기화 완료!");
}

// ════════════════════════════════════════════
//  시작!
// ════════════════════════════════════════════
init();
</script>
